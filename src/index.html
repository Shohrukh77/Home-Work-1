<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
    <link rel="stylesheet" href="./fontawesome-free-6.4.2-web/css/all.css">
</head>

<body class="font-sans">
    <header class="h-[985px]">
        <nav class="w-[70%] m-auto flex items-center">
            <img src="./Group 19 2.png" alt="">
            <div class="flex gap-[60px] ml-[150px] items-center">
                <ul class="flex gap-[30px] text-white ">
                    <li>Главная</li>
                    <li>Про гида</li>
                    <li>Программа тура</li>
                    <li>Стоимость</li>
                    <li>Блог</li>
                    <li>Контакты</li>
                </ul>
                <button
                    class="text-white border-none rounded-[4px] bg-[#1A3E3E] p-[10px] px-[20px]">Консультация</button>
            </div>
        </nav>
        <section class="text-white w-[70%] m-auto mt-[550px]">
            <h1 class="font-bold text-[50px] leading-[75px] mb-[50px]">Насладись прогулкой в горах <br>
                с командой единомышленников</h1>
            <div class="bg-[#ffffff]/20 backdrop-blur-[6px] p-[20px] rounded-[10px]">
                <div class="flex gap-[30px] ">
                    <article class="p-[10px] w-[23%] border-[1px] border-[#E1E3E4] rounded-[8px]">
                        <div class="flex items-center">
                            <p class="mr-[50px] font-bold">Локация для тура</p>
                            <i class="fa-solid fa-chevron-down" style="color: #ffffff;"></i>
                        </div>
                    </article>
                    <article class="p-[10px] w-[23%] border-[1px] border-[#E1E3E4] rounded-[8px]">
                        <div class="flex items-center">
                            <p class="mr-[100px] font-bold">Дата похода</p>
                            <i class="fa-solid fa-calendar-days" style="color: #ffffff;"></i>
                        </div>
                    </article>
                    <article class="p-[10px] w-[23%] border-[1px] border-[#E1E3E4] rounded-[8px]">
                        <div class="flex items-center">
                            <p class="mr-[110px] font-bold">Участники</p>
                            <i class="fa-solid fa-chevron-down" style="color: #ffffff;"></i>
                        </div>
                    </article>
                    <article class="p-[10px] w-[23%] rounded-[8px] bg-white">
                        <div class="flex items-center">
                            <p class=" ml-8 font-bold text-[#1A3E3E]">Найти программу</p>
                        </div>
                    </article>
                </div>
                <div class="flex gap-[30px]">
                    <p class="p-[10px] w-[23%]">выберите из списка</p>
                    <p class="p-[10px] w-[23%]">укажите диапазон</p>
                    <p class="p-[10px] w-[23%]">минимум 4 человека</p>
                </div>
            </div>
        </section>
    </header>
</body>

</html>
